<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BIBLIO-TECH - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .login-container { 
            border: 2px solid #555; 
            width: 300px; 
            padding: 20px; 
            margin: 40px auto; 
            background: #fff;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .logo-placeholder { 
            width: 50px; 
            height: 50px; 
            border: 1px solid #333; 
            margin: 0 auto 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; color: #888;
        }
        h2 { text-align: center; font-size: 18px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #333;}
        .form-group input { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #999; }
        .btn { 
            width: 100%; 
            padding: 10px; 
            background: #e0e0e0; 
            border: 1px solid #555; 
            font-weight: bold;
            cursor: pointer; 
        }
        .btn:hover { background: #ccc; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-placeholder">☒</div>
    <h2>BIBLIO-TECH</h2>
    
    <div class="form-group">
        <label>Usuario:</label>
        <input type="text" placeholder="Ingrese usuario">
    </div>
    
    <div class="form-group">
        <label>Contraseña:</label>
        <input type="password" placeholder="••••••••">
    </div>
    
    <button class="btn">INGRESAR AL SISTEMA</button>
</div>

</body>
</html>
