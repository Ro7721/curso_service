<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BIBLIO-TECH - Devoluciones</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .dev-container { 
            border: 2px solid #333; 
            width: 750px; 
            padding: 20px; 
            margin: 0 auto; 
            background: #fff;
        }
        .nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #555; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
        }
        .nav h2 { margin: 0; font-size: 22px; }
        .nav-buttons button { 
            margin-left: 5px; 
            padding: 5px 15px; 
            border: 1px solid #777; 
            background: #f0f0f0; 
            cursor: pointer;
        }
        .nav-buttons .active { background: #ccc; font-weight: bold; }
        .scan-section { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 20px; 
            font-size: 14px;
        }
        .scan-section input { padding: 5px; width: 180px; border: 1px solid #999;}
        .scan-section button { padding: 5px 15px; border: 1px solid #777; background: #e0e0e0; cursor: pointer; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 20px; 
        }
        table, th, td { border: 2px solid #333; }
        th { background: #e9e9e9; padding: 8px; text-align: left; font-size: 14px; }
        td { padding: 8px; font-size: 13px; }
        
        .alert-box { 
            border: 2px solid #333; 
            background-color: #f4f4f4; 
            padding: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 13px;
        }
        .alert-text { font-weight: bold; }
        
        .btn-main { 
            width: 100%; 
            padding: 12px; 
            background: #d4d4d4; 
            border: 2px solid #333; 
            cursor: pointer; 
            font-weight: bold; 
            text-align: center; 
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="dev-container">
    <div class="nav">
        <h2>BIBLIO-TECH</h2>
        <div class="nav-buttons">
            <button>Inicio</button>
            <button>Prestar</button>
            <button class="active">Devolución</button>
        </div>
    </div>
    
    <div class="scan-section">
        <label>Escanee Código del Libro:</label>
        <input type="text" value="978-3-16-148410-0">
        <button>Procesar</button>
    </div>
    
    <table>
        <tr>
            <th>Libro Escaneado</th>
            <th>Lector Responsable</th>
            <th>Vencimiento</th>
            <th>Retraso</th>
        </tr>
        <tr>
            <td>Introducción a la Visión Computacional</td>
            <td>Julio Cesar Lloclla</td>
            <td>25/06/2026</td>
            <td>6 Días</td>
        </tr>
    </table>
    
    <div class="alert-box">
        <span class="alert-text">⚠ ALERTA: Se detectó retraso. Mora total: S/. 12.00</span>
        <label><input type="checkbox"> Multa pagada en ventanilla</label>
    </div>
    
    <button class="btn-main">💾 REGISTRAR INGRESO A ALMACÉN</button>
</div>

</body>
</html>
