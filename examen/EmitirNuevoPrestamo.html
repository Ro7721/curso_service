<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BIBLIO-TECH - Nuevo Préstamo pot test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .prestamo-container { 
            border: 2px solid #555; 
            width: 600px; 
            padding: 20px; 
            margin: 0 auto; 
            background: #fff;
        }
        .header { border-bottom: 2px solid #555; margin-bottom: 15px; padding-bottom: 10px; }
        .header h2 { margin: 0; font-size: 20px; }
        fieldset { border: 1px solid #999; margin-bottom: 15px; padding: 10px; }
        legend { font-size: 14px; font-weight: bold; background: #fff; padding: 0 5px; }
        .row { display: flex; gap: 15px; margin-bottom: 10px; }
        .col { flex: 1; }
        label { display: block; font-size: 12px; margin-bottom: 4px; font-weight: bold;}
        input[type="text"], input[type="date"] { width: 100%; padding: 5px; box-sizing: border-box; border: 1px solid #aaa; }
        .radio-group { font-size: 13px; display: flex; align-items: center; gap: 10px; margin-top: 5px;}
        .btn { 
            width: 100%; 
            padding: 10px; 
            background: #e0e0e0; 
            border: 1px solid #555; 
            cursor: pointer; 
            font-weight: bold; 
            text-align: center;
        }
    </style>
</head>
<body>

<div class="prestamo-container">
    <div class="header">
        <h2>BIBLIO-TECH</h2>
    </div>
    
    <fieldset>
        <legend>1 Datos del Lector</legend>
        <div class="row">
            <div class="col">
                <label>DNI del Lector</label>
                <input type="text">
            </div>
            <div class="col">
                <label>Lector</label>
                <input type="text" disabled style="background:#eee;">
            </div>
        </div>
    </fieldset>
    
    <fieldset>
        <legend>2 Datos del Libro</legend>
        <div class="row">
            <div class="col"><label>ISBN</label><input type="text"></div>
            <div class="col"><label>Título</label><input type="text"></div>
            <div class="col"><label>Autor</label><input type="text"></div>
        </div>
        <div class="row">
            <div class="col"><label>Edición</label><input type="text"></div>
            <div class="col"></div>
            <div class="col"></div>
        </div>
    </fieldset>
    
    <div class="row" style="margin-bottom: 20px;">
        <div class="col">
            <label>Fecha Préstamo</label>
            <input type="date">
        </div>
        <div class="col">
            <label>Condiciones</label>
            <div class="radio-group">
                <label><input type="radio" name="condicion" checked> Bueno</label>
                <label><input type="radio" name="condicion"> Malo</label>
                <label><input type="radio" name="condicion"> Regular</label>
            </div>
        </div>
    </div>
    
    <button class="btn">+ EMITIR NUEVO PRÉSTAMO</button>
</div>

</body>
</html>
